<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>国坤的工作学习空间</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0f0f1a;
    color: #e8e8e8;
    min-height: 100vh;
  }
  /* 密码门 */
  #login-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at top, #1a1a2e 0%, #0f0f1a 60%);
  }
  .login-box {
    background: rgba(22, 33, 62, 0.6);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(83, 216, 251, 0.15);
    border-radius: 20px;
    padding: 48px 40px;
    width: 400px;
    max-width: 90vw;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  }
  .login-box .icon {
    font-size: 40px;
    margin-bottom: 16px;
  }
  .login-box h1 {
    font-size: 22px;
    color: #53d8fb;
    margin-bottom: 8px;
    font-weight: 600;
    letter-spacing: 1px;
  }
  .login-box .subtitle {
    font-size: 14px;
    color: #a0a0b0;
    margin-bottom: 32px;
  }
  .login-box input {
    width: 100%;
    padding: 14px 20px;
    background: rgba(15, 52, 96, 0.3);
    border: 1px solid rgba(83, 216, 251, 0.15);
    border-radius: 10px;
    color: #e8e8e8;
    font-size: 16px;
    margin-bottom: 16px;
    outline: none;
    transition: all 0.3s;
  }
  .login-box input::placeholder { color: #555; }
  .login-box input:focus {
    border-color: #53d8fb;
    background: rgba(15, 52, 96, 0.5);
    box-shadow: 0 0 0 3px rgba(83, 216, 251, 0.1);
  }
  .login-box button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #0f3460, #e94560);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 4px;
  }
  .login-box button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(233, 69, 96, 0.3);
  }
  .login-box button:active {
    transform: translateY(0);
  }
  .error-msg {
    color: #e94560;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }
  .footer-hint {
    margin-top: 24px;
    font-size: 12px;
    color: #444;
  }
  /* 内容展示 */
  #content-page { display: none; }
  #content-page .top-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 999;
    background: rgba(15, 15, 26, 0.9);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(83, 216, 251, 0.15);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 14px;
  }
  #content-page .top-bar .title { color: #53d8fb; }
  #content-page .top-bar button {
    background: rgba(233, 69, 96, 0.2);
    border: 1px solid rgba(233, 69, 96, 0.3);
    color: #e94560;
    padding: 6px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }
  #content-page .top-bar button:hover {
    background: rgba(233, 69, 96, 0.3);
  }
  #content-frame {
    width: 100vw;
    height: 100vh;
    border: none;
    padding-top: 0;
  }
  /* 加载动画 */
  .loader {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid rgba(83, 216, 251, 0.2);
    border-top-color: #53d8fb;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- 密码门 -->
<div id="login-page">
  <div class="login-box">
    <div class="icon">📊</div>
    <h1>国坤的工作学习空间</h1>
    <p class="subtitle">私人知识库 · 请输入密码访问</p>
    <input type="password" id="pwd-input" placeholder="密码" onkeydown="if(event.key==='Enter')doLogin()" autofocus>
    <button onclick="doLogin()">进 入</button>
    <div class="error-msg" id="err-msg">密码错误，请重试</div>
    <div class="footer-hint">Revvity 销售赋能 · 2026</div>
  </div>
</div>

<!-- 内容页 -->
<div id="content-page">
  <div class="top-bar">
    <span class="title">📊 国坤的工作学习空间</span>
    <button onclick="logout()">← 返回</button>
  </div>
  <iframe id="content-frame"></iframe>
</div>

// 密码哈希（SHA-256）
var _hash = "ee20977e4997e4178dd394338a48803baf16a1b2665e29108e11f161682cb327";

function doLogin() {
  var input = document.getElementById('pwd-input').value;
  if (!input) return;

  var inputHash = CryptoJS.SHA256(input).toString();
  if (inputHash !== _hash) {
    document.getElementById('err-msg').style.display = 'block';
    document.getElementById('pwd-input').value = '';
    return;
  }

  // 解密内容
  try {
    var bytes = CryptoJS.AES.decrypt(_enc, input);
    var content = bytes.toString(CryptoJS.enc.Utf8);
    if (!content) throw new Error('decrypt failed');

    var frame = document.getElementById('content-frame');
    frame.srcdoc = content;
    frame.style.marginTop = '0';
    frame.style.height = '100vh';

    document.getElementById('login-page').style.display = 'none';
    document.getElementById('content-page').style.display = 'block';
  } catch(e) {
    document.getElementById('err-msg').style.display = 'block';
  }
}

function logout() {
  document.getElementById('content-page').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('pwd-input').value = '';
  document.getElementById('err-msg').style.display = 'none';
  document.getElementById('content-frame').srcdoc = '';
  document.getElementById('pwd-input').focus();
}
</script>
